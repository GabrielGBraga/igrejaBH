name: "🔍 Supabase Database Preview"

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  db-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: 🛡️ Validate Source Branch
        if: github.base_ref == 'main' && github.head_ref != 'dev'
        run: |
          echo "❌ ERRO DE FLUXO: Merges para a branch 'main' só são permitidos a partir da branch 'dev'."
          echo "Sua branch de origem é: ${{ github.head_ref }}"
          exit 1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Generate DB Diff
        id: db_diff
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Remove migrations anteriores do mesmo PR para evitar duplicidade
          rm -f supabase/migrations/*_auto_migration.sql
          git add supabase/migrations/ || true
          git commit -m "chore(db): clean previous auto-migrations" || true

          # Gera o diff contra o banco de DEV
          supabase db diff --db-url "${{ secrets.DEV_DB_URL }}" > preview.sql
          
          if ! grep -vE "^(--|[[:space:]]*$)" preview.sql | grep -q "[a-zA-Z0-9]"; then
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          else
            # Limpa o SQL para o comentário
            sed -E '/^[[:space:]]*(GRANT|REVOKE|grant|revoke)\b/d' preview.sql | \
            sed -E '/^--/d' | \
            sed -E '/^[[:space:]]*$/d' > clean_preview.sql
            
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 🛡️ Security Audit
        if: steps.db_diff.outputs.changes_detected == 'true'
        id: audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/audit_rls.sh
          
          # Auditoria de RLS
          ./scripts/audit_rls.sh preview.sql > audit_log.txt 2>&1 || true
          RLS_FAILED=$?
          
          # Auditoria de DROP (Verificação dinâmica de label via GH CLI)
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name')
          FORCE_DROP=$(echo "$LABELS" | grep -w "force-db-drop" || echo "false")
          
          DROP_DETECTED="false"
          if grep -Ei "DROP TABLE|DROP COLUMN" preview.sql; then
            DROP_DETECTED="true"
          fi

          # Determina o Status Final
          STATUS="passed"
          ERROR_MSG=""
          
          if [ "$RLS_FAILED" -ne 0 ]; then
            STATUS="failed"
            ERROR_MSG="❌ ERRO DE RLS: Tabelas detectadas sem Row Level Security."
          fi
          
          if [ "$DROP_DETECTED" = "true" ] && [ "$FORCE_DROP" = "false" ]; then
            STATUS="failed"
            ERROR_MSG="${ERROR_MSG}\n❌ ERRO DE SEGURANÇA: Comandos DROP detectados sem label 'force-db-drop'."
          fi

          # Exporta para o comentário
          echo "audit_status=$STATUS" >> $GITHUB_OUTPUT
          {
            echo "audit_log<<EOF"
            cat audit_log.txt
            echo "EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "audit_error<<EOF"
            echo -e "$ERROR_MSG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 💬 Post Result to PR
        if: steps.db_diff.outputs.changes_detected == 'true'
        uses: actions/github-script@v7
        env:
          SQL_PREVIEW_FILE: 'clean_preview.sql'
          AUDIT_LOG: ${{ steps.audit.outputs.audit_log }}
          AUDIT_STATUS: ${{ steps.audit.outputs.audit_status }}
          AUDIT_ERROR: ${{ steps.audit.outputs.audit_error }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const sql = fs.existsSync(process.env.SQL_PREVIEW_FILE) ? fs.readFileSync(process.env.SQL_PREVIEW_FILE, 'utf8') : '-- Nenhuma mudança';
            const auditLog = process.env.AUDIT_LOG;
            const auditStatus = process.env.AUDIT_STATUS;
            const auditError = process.env.AUDIT_ERROR;
            
            let auditEmoji = auditStatus === 'passed' ? '✅' : '❌';
            
            const body = `### 🔍 Supabase Database Preview
            
            #### 🛠️ Alterações Detectadas:
            \`\`\`sql
            ${sql}
            \`\`\`
            
            #### 🛡️ Auditoria de Segurança:
            ${auditEmoji} **Status: ${auditStatus.toUpperCase()}**
            
            ${auditError ? `\n> **Atenção:**\n${auditError}\n` : ''}
            
            <details>
            <summary>Clique para ver o Log da Auditoria</summary>
            
            \`\`\`text
            ${auditLog}
            \`\`\`
            </details>
            
            ${auditStatus === 'passed' ? '> 🚀 **Ação:** Uma nova migration será gerada automaticamente.' : '> ⚠️ **Ação Necessária:** Corrija os problemas acima para que a migration seja gerada.'}`;
            
            // Posta o comentário
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

            // Se falhar, faz uma Review de "Request Changes" para travar visualmente
            if (auditStatus === 'failed') {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event: 'REQUEST_CHANGES',
                body: '🚨 **BLOQUEIO DE SEGURANÇA:** Alterações de banco de dados inseguras detectadas. Verifique o comentário acima para detalhes.'
              });
            } else {
              // Se passar, e houver reviews anteriores minhas, eu as aprovo
              const reviews = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });
              const myReview = reviews.data.find(r => r.user.login === 'github-actions[bot]' && r.state === 'CHANGES_REQUESTED');
              if (myReview) {
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  event: 'APPROVE',
                  body: '✅ Problemas de segurança resolvidos.'
                });
              }
            }

      - name: 🚀 Auto-Commit Migration
        if: steps.db_diff.outputs.changes_detected == 'true' && steps.audit.outputs.audit_status == 'passed'
        run: |
          MIGRATION_FILE="supabase/migrations/$(date +%Y%m%d%H%M%S)_auto_migration.sql"
          mv preview.sql "$MIGRATION_FILE"
          git add "$MIGRATION_FILE"
          git commit -m "chore(db): auto-generate migration from DEV"
          git push origin HEAD:${{ github.head_ref }}

      - name: 🛑 Enforce Block
        if: steps.db_diff.outputs.changes_detected == 'true' && steps.audit.outputs.audit_status == 'failed'
        run: |
          echo "Audit failed. Check PR comments for details."
          exit 1
