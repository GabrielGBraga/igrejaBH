name: "🔍 Supabase Database Preview"

on:
  pull_request:
    branches:
      - main

jobs:
  db-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Generate DB Diff
        id: db_diff
        run: |
          # Limpeza estratégica: remove migrations auto-geradas anteriores nesta branch
          # para que o 'db diff' compare o estado atual de DEV contra a base estável do repositório.
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          EXISTING_AUTO_MIGRATIONS=$(ls supabase/migrations/*_auto_migration.sql 2>/dev/null || true)
          if [ ! -z "$EXISTING_AUTO_MIGRATIONS" ]; then
            echo "🗑️ Removendo migrations auto-geradas anteriores para consolidação..."
            rm $EXISTING_AUTO_MIGRATIONS
            git add supabase/migrations/
            # Se não houver nada para commitar após o rm (caso raro), o || true evita erro
            git commit -m "chore(db): clean previous auto-migrations for squash" || true
          fi

          # 1. Gerar o diff completo
          supabase db diff --db-url "${{ secrets.DEV_DB_URL }}" > preview.sql
          
          # 2. Verificar se há conteúdo relevante (ignora comentários e linhas vazias)
          if ! grep -vE "^(--|[[:space:]]*$)" preview.sql | grep -q "[a-zA-Z0-9]"; then
            echo "sql_output=-- Nenhum mudança de esquema detectada." >> $GITHUB_OUTPUT
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          else
            # 3. Criar versão limpa (sem GRANT/REVOKE) para o comentário do PR
            # Remove ruídos comuns de ambiente de dev
            sed -E '/^[[:space:]]*(GRANT|REVOKE|grant|revoke)\b/d' preview.sql | \
            sed -E '/^--/d' | \
            sed -E '/^[[:space:]]*$/d' > clean_preview.sql
            
            echo "sql_output<<EOF" >> $GITHUB_OUTPUT
            cat clean_preview.sql >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 🛡️ Security Audit (RLS & Destructive Changes)
        if: steps.db_diff.outputs.changes_detected == 'true'
        id: audit
        run: |
          chmod +x scripts/audit_rls.sh
          AUDIT_OUTPUT=$(./scripts/audit_rls.sh preview.sql 2>&1)
          AUDIT_EXIT_CODE=$?
          
          # Salva o output para o comentário, escapando caracteres especiais
          echo "audit_log<<EOF" >> $GITHUB_OUTPUT
          echo "$AUDIT_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          FORCE_DROP="${{ contains(github.event.pull_request.labels.*.name, 'force-db-drop') }}"
          DROP_DETECTED="false"
          if grep -Ei "DROP TABLE|DROP COLUMN" preview.sql; then
            DROP_DETECTED="true"
            if [ "$FORCE_DROP" != "true" ]; then
              echo "audit_error=❌ ERRO DE SEGURANÇA: Comandos DROP detectados sem label 'force-db-drop'." >> $GITHUB_OUTPUT
              echo "audit_status=failed" >> $GITHUB_OUTPUT
            else
              echo "audit_status=passed" >> $GITHUB_OUTPUT
            fi
          elif [ $AUDIT_EXIT_CODE -ne 0 ]; then
            echo "audit_error=❌ ERRO DE RLS: Tabelas detectadas sem Row Level Security." >> $GITHUB_OUTPUT
            echo "audit_status=failed" >> $GITHUB_OUTPUT
          else
            echo "audit_status=passed" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: 💬 Post SQL Preview and Audit to PR
        if: steps.db_diff.outputs.changes_detected == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sql = `${{ steps.db_diff.outputs.sql_output }}`;
            const auditLog = `${{ steps.audit.outputs.audit_log }}`;
            const auditStatus = `${{ steps.audit.outputs.audit_status }}`;
            const auditError = `${{ steps.audit.outputs.audit_error }}`;
            
            let auditEmoji = auditStatus === 'passed' ? '✅' : '❌';
            
            const body = `### 🔍 Supabase Database Preview
            
            #### 🛠️ Alterações Detectadas:
            \`\`\`sql
            ${sql}
            \`\`\`
            
            #### 🛡️ Auditoria de Segurança:
            ${auditEmoji} **Status: ${auditStatus.toUpperCase()}**
            
            ${auditError ? `> **Erro:** ${auditError}\n` : ''}
            
            <details>
            <summary>Clique para ver o Log da Auditoria</summary>
            
            \`\`\`text
            ${auditLog}
            \`\`\`
            </details>
            
            ${auditStatus === 'passed' ? '> 🚀 **Ação:** Uma nova migration será gerada automaticamente.' : '> ⚠️ **Ação Necessária:** Corrija os erros acima para prosseguir.'}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })

      - name: 🛑 Fail if Audit Failed
        if: steps.audit.outputs.audit_status == 'failed'
        run: |
          echo "A auditoria de segurança falhou. Verifique o comentário no PR."
          exit 1

      - name: 🚀 Auto-Commit Migration
        if: steps.db_diff.outputs.changes_detected == 'true' && steps.audit.outputs.audit_status == 'passed'
        run: |
          # Usar o arquivo COMPLETO (preview.sql) para a migration real
          MIGRATION_FILE="supabase/migrations/$(date +%Y%m%d%H%M%S)_auto_migration.sql"
          mv preview.sql "$MIGRATION_FILE"
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add "$MIGRATION_FILE"
          git commit -m "chore(db): auto-generate migration from DEV"
          git push origin HEAD:${{ github.head_ref }}
