name: "🔍 Supabase Database Preview"

on:
  pull_request:
    branches:
      - main

jobs:
  db-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Generate DB Diff
        id: db_diff
        run: |
          # 1. Gerar o diff comparando o banco de Desenvolvimento (Fonte) contra as migrações locais (que espelham PRD)
          # A CLI compara a URL fornecida contra o estado definido nos arquivos em supabase/migrations/
          supabase db diff --db-url "${{ secrets.DEV_DB_URL }}" > preview.sql
          
          # 2. Ler o conteúdo para o Step de Comentário
          DIFF_CONTENT=$(cat preview.sql)
          
          # Se o diff estiver vazio ou contiver apenas comentários padrão, define como sem mudanças
          if [ -z "$DIFF_CONTENT" ] || ! grep -v "^--" preview.sql | grep -q "[a-zA-Z0-9]"; then
            echo "sql_output=-- Nenhum mudança de esquema detectada." >> $GITHUB_OUTPUT
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          else
            # Prepara a saída para o GitHub Actions (lidando com multiline)
            echo "sql_output<<EOF" >> $GITHUB_OUTPUT
            echo "$DIFF_CONTENT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 🛡️ Security Guard (Destructive Changes Check)
        if: steps.db_diff.outputs.changes_detected == 'true'
        run: |
          # Procura por padrões destrutivos (Case-Insensitive)
          if grep -Ei "DROP TABLE|DROP COLUMN" preview.sql; then
            echo "❌ ERRO CRÍTICO DE SEGURANÇA: Alterações destrutivas (DROP) detectadas!"
            echo "O merge foi bloqueado para proteger a integridade dos dados em Produção."
            exit 1
          fi
          echo "✅ Nenhuma alteração destrutiva detectada."

      - name: 💬 Post SQL Preview to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sql = `${{ steps.db_diff.outputs.sql_output }}`;
            const body = `### 🔍 Supabase Database Preview
            
            Auditamos o esquema do banco de dados de **Desenvolvimento** contra o estado atual do repositório (Produção). Abaixo está o SQL que será necessário para aplicar estas mudanças:

            \`\`\`sql
            ${sql}
            \`\`\`
            
            > 🛡️ **DevSecOps Note:** Este workflow validou que não existem comandos \`DROP\` neste SQL.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
