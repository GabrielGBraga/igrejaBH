name: Deploy Migrations to PRD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link and Repair History
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID_PRD }} --password ${{ secrets.SUPABASE_DB_PASSWORD_PRD }}
          # Marcar migrações antigas como já aplicadas para evitar conflitos de tipos já existentes
          supabase migration repair --status applied 20260417000000 --password ${{ secrets.SUPABASE_DB_PASSWORD_PRD }}
          supabase migration repair --status applied 20260420000000 --password ${{ secrets.SUPABASE_DB_PASSWORD_PRD }}
          supabase migration repair --status applied 20260421012456 --password ${{ secrets.SUPABASE_DB_PASSWORD_PRD }}
          supabase migration repair --status applied 20260421014724 --password ${{ secrets.SUPABASE_DB_PASSWORD_PRD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy New Migrations
        run: |
          # O comando push agora só enviará o que não foi marcado acima
          supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD_PRD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
